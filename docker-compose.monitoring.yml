# 모니터링 스택 — 운영 compose와 "별도 파일"로 분리
#
# 분리한 이유:
#   ① 배포 파이프라인(deploy.yml)이 건드리지 않음 — 모니터링 장애가 서비스
#      배포를 막지 않고, 반대로 배포가 모니터링을 재시작시키지도 않는다
#   ② 메모리가 부족하면 모니터링만 내릴 수 있다 (서비스는 무영향)
#
# 실행:  docker compose -f docker-compose.monitoring.yml up -d
# 중지:  docker compose -f docker-compose.monitoring.yml down
#
# 기존 서비스와 통신하는 원리: 맨 아래 networks에서 운영 compose가 만든
# 네트워크(teamg-backend_default)에 "외부 네트워크"로 합류한다.
# → Prometheus가 web:8000/metrics를 내부에서 직접 긁을 수 있다.

services:

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: teamg-prometheus
    # EC2 재부팅 후 자동 기동 (unless-stopped = 수동 stop만 제외)
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d    # 보관 7일 — 작은 EC2 디스크 보호
    networks: [backend]
    # 포트를 밖에 안 연다 — Grafana만 내부 네트워크로 접근 (보안)

  grafana:
    image: grafana/grafana:11.1.0
    container_name: teamg-grafana
    restart: unless-stopped         # 재부팅 후 자동 기동
    ports:
      - "3000:3000"                         # 대시보드 접속 문 (보안그룹에서 3000 허용 필요)
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      # 비밀번호는 .env에서 읽는다 (GRAFANA_ADMIN_PASSWORD 줄 추가 필요)
      # ":-changeme" = 미설정 시 기본값 — 반드시 .env에 실제 값을 넣을 것
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
    volumes:
      - grafana-data:/var/lib/grafana       # 대시보드 설정이 재시작에도 유지되게
    depends_on:
      - prometheus
    networks: [backend]

  # 로그 저장소 — Promtail이 밀어넣는 컨테이너 로그를 보관 (7일)
  # Grafana에서 로그 검색 가능 (지금까지는 SSH로 docker logs를 쳐야 했음)
  loki:
    image: grafana/loki:3.1.0
    container_name: teamg-loki
    restart: unless-stopped         # 재부팅 후 자동 기동
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    networks: [backend]
    # 포트를 밖에 안 연다 — Grafana/Promtail만 내부 네트워크로 접근

  # 로그 배달부 — 도커 컨테이너 로그를 읽어 Loki로 push
  promtail:
    image: grafana/promtail:3.1.0
    container_name: teamg-promtail
    restart: unless-stopped         # 재부팅 후 자동 기동
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro      # 컨테이너 발견용
      - /var/lib/docker/containers:/var/lib/docker/containers:ro   # 로그 파일 읽기
    depends_on:
      - loki
    networks: [backend]

  # 컨테이너별 리소스 지표 수집기 — 호스트의 도커 상태를 읽어야 해서
  # 시스템 경로들을 읽기 전용으로 마운트한다 (cAdvisor 공식 권장 구성)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1   # 0.49는 최신 도커와 호환 문제 → 업그레이드
    container_name: teamg-cadvisor
    restart: unless-stopped         # 재부팅 후 자동 기동
    # privileged가 없으면 최신 우분투(cgroup v2)에서 도커 컨테이너를 못 읽어서
    # 시스템 서비스(system.slice)만 보이고 컨테이너 지표(name 라벨)가 안 나온다
    privileged: true
    devices:
      - /dev/kmsg                          # 공식 권장 — 커널 메시지 장치
    command:
      # 최신 도커(containerd 이미지 저장소, 드라이버명 overlayfs)에서는 cAdvisor가
      # 컨테이너 디스크 사용량(rw layer) 경로를 못 찾아 "Failed to create existing
      # container" 에러와 함께 컨테이너 지표 전체가 실패한다.
      # → 디스크 사용량(disk) 지표만 끄면 CPU/메모리/네트워크는 정상 수집된다.
      #   (나머지는 cAdvisor 기본 비활성 목록을 유지한 것)
      - --disable_metrics=disk,tcp,udp,percpu,sched,process,hugetlb,referenced_memory,cpu_topology,resctrl
      - --docker_only=true                 # 시스템 cgroup 제외, 도커 컨테이너만 수집 (소음 감소)
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro            # 공식 권장 — 디스크 지표용
    networks: [backend]

networks:
  backend:
    external: true                    # "이미 있는 네트워크에 합류" 선언
    name: teamg-backend_default       # 운영 compose(폴더명 기반)가 만든 네트워크
                                      # EC2에서 docker network ls로 이름 확인 가능

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
