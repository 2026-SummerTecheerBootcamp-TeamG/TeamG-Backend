# Prometheus 수집 설정
#
# Prometheus는 "긁어오는(pull)" 방식: 여기 적힌 대상들의 /metrics를
# 15초마다 HTTP GET으로 읽어 시계열 DB에 쌓는다.

global:
  scrape_interval: 15s

scrape_configs:
  # Django 애플리케이션 지표 (django-prometheus: 요청 수/지연/DB 쿼리 등)
  # 대상이 web:8000인 이유: 같은 도커 네트워크에서는 서비스명 = 호스트명.
  # (예전 host.docker.internal:8000은 로컬 개발용 — 리눅스 운영에선 동작 안 함)
  - job_name: "django"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8000"]

  # 컨테이너별 CPU/메모리/네트워크 (cAdvisor)
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]

  # Prometheus 자기 자신 (수집이 살아있는지 확인용)
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
