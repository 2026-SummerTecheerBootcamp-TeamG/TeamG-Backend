# 리버스 프록시 + HTTPS (api.tripcanvas.cloud)
#
# 구조: 80 포트는 두 가지 일만 한다 —
#   ① 인증서 발급/갱신 검증 파일 서빙 (Let's Encrypt가 이 경로로 소유권 확인)
#   ② 나머지 전부 https로 리다이렉트
# 실제 서비스는 443(HTTPS)이 담당한다.
#
# [보안] 이 파일은 conf.d/에 포함되므로 아래 지시어들은 http 컨텍스트에 놓인다.

# 에러 페이지 등에 nginx 버전 숨김 (버전 노출 = 공격자에게 취약점 힌트)
server_tokens off;

# ── 요청 속도 제한(rate limit) 존 정의 ──
# $binary_remote_addr = 접속자 IP. 존은 "IP별 카운터 보관함"(10m ≈ IP 16만 개).
#   api  존: 일반 API — 초당 10건 허용 (정상 사용자는 걸릴 일 없는 수준)
#   auth 존: 로그인/회원가입 — 초당 1건 (무차별 대입 공격을 사실상 무력화)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=1r/s;
# 제한 초과 시 429(Too Many Requests)로 응답 (기본값 503은 장애로 오해됨)
limit_req_status 429;

# ── 문전박대 서버: 도메인이 아닌 "IP 직접 접근"은 응답 없이 차단 ──
# 인터넷 스캐너는 도메인이 아니라 IP 대역을 훑으며 두드린다 (대시보드의 404 소음).
# default_server = 아래 본 서버의 server_name과 일치하지 않는 모든 요청이 오는 곳.
server {
    listen 80 default_server;
    server_name _;
    return 444;                   # 444 = nginx 전용 "응답 없이 연결 끊기"
}
server {
    listen 443 ssl default_server;
    server_name _;
    ssl_reject_handshake on;      # 인증서 협상 자체를 거절 — 인증서 없이도 차단 가능
}

server {
    listen 80;
    server_name api.tripcanvas.cloud;

    # Let's Encrypt 소유권 검증 경로 — 여기만 http로 남긴다 (갱신에 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 http 요청은 https로 (301 = 영구 이동)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.tripcanvas.cloud;

    # certbot이 발급한 인증서 (certbot-conf 볼륨에 저장됨)
    ssl_certificate     /etc/letsencrypt/live/api.tripcanvas.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tripcanvas.cloud/privkey.pem;

    # ── 기본 보안 헤더 (always = 에러 응답에도 붙임) ──
    # HSTS: 브라우저에게 "이 도메인은 1년간 무조건 https로만 접속하라" 각인
    add_header Strict-Transport-Security "max-age=31536000" always;
    # 응답을 다른 사이트의 iframe에 넣지 못하게 (클릭재킹 방지)
    add_header X-Frame-Options DENY always;
    # 브라우저가 Content-Type을 멋대로 추측하지 못하게 (MIME 스니핑 방지)
    add_header X-Content-Type-Options nosniff always;

    # 요청 본문 크기 제한 — 우리 API는 JSON뿐이라 2MB면 충분 (거대 요청 폭탄 방지)
    client_max_body_size 2m;

    # Django admin/Swagger 정적 파일은 nginx가 직접 서빙 (빠름)
    location /static/ {
        alias /app/staticfiles/;
    }

    # 지표(/metrics)는 외부 차단 — 요청량/DB 통계는 내부 정보다.
    # Prometheus는 nginx를 거치지 않고 도커 내부에서 web:8000을 직접 긁으므로
    # 이 경로가 인터넷에 열려 있을 이유가 없다.
    location = /metrics {
        return 404;
    }

    # 로그인/회원가입/토큰 갱신 — 무차별 대입 방지용 엄격한 제한 (초당 1건 + 여유 5건)
    # burst = 순간적으로 몰릴 때 봐주는 여유분, nodelay = 여유분은 지연 없이 즉시 처리
    location /api/v1/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # 일반 API 속도 제한 (초당 10건 + 여유 20건 — 정상 사용에는 안 걸림)
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://web:8000;           # 도커 네트워크에서 서비스명 = 호스트명
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Django가 "지금 https로 접속됐다"를 알게 하는 표식
        # (없으면 Django가 http인 줄 알고 리다이렉트/CSRF 판정이 꼬일 수 있음)
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 필수 3종: 버퍼링하면 이벤트가 모였다가 한꺼번에 터진다
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;             # 오래 열려 있는 스트림 연결 허용
    }
}
