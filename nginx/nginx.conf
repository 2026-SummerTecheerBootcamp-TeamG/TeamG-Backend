# 리버스 프록시: 외부 80포트 요청을 내부 web 컨테이너(8000)로 전달

server {
    listen 80;

    # Django admin 등 정적 파일은 nginx가 직접 서빙 (빠름)
    location /static/ {
        alias /app/staticfiles/;
    }

    location / {
        proxy_pass http://web:8000;           # 도커 네트워크에서 서비스명 = 호스트명
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # ↓ SSE 필수 3종: 버퍼링하면 이벤트가 모였다가 한꺼번에 터진다
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;             # 오래 열려 있는 스트림 연결 허용
    }
}