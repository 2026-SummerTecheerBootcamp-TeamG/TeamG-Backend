# 리버스 프록시 + HTTPS (api.tripcanvas.cloud)
#
# 구조: 80 포트는 두 가지 일만 한다 —
#   ① 인증서 발급/갱신 검증 파일 서빙 (Let's Encrypt가 이 경로로 소유권 확인)
#   ② 나머지 전부 https로 리다이렉트
# 실제 서비스는 443(HTTPS)이 담당한다.

server {
    listen 80;
    server_name api.tripcanvas.cloud;

    # Let's Encrypt 소유권 검증 경로 — 여기만 http로 남긴다 (갱신에 필요)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 그 외 모든 http 요청은 https로 (301 = 영구 이동)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.tripcanvas.cloud;

    # certbot이 발급한 인증서 (certbot-conf 볼륨에 저장됨)
    ssl_certificate     /etc/letsencrypt/live/api.tripcanvas.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.tripcanvas.cloud/privkey.pem;

    # Django admin/Swagger 정적 파일은 nginx가 직접 서빙 (빠름)
    location /static/ {
        alias /app/staticfiles/;
    }

    # 지표(/metrics)는 외부 차단 — 요청량/DB 통계는 내부 정보다.
    # Prometheus는 nginx를 거치지 않고 도커 내부에서 web:8000을 직접 긁으므로
    # 이 경로가 인터넷에 열려 있을 이유가 없다.
    location = /metrics {
        return 404;
    }

    location / {
        proxy_pass http://web:8000;           # 도커 네트워크에서 서비스명 = 호스트명
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Django가 "지금 https로 접속됐다"를 알게 하는 표식
        # (없으면 Django가 http인 줄 알고 리다이렉트/CSRF 판정이 꼬일 수 있음)
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 필수 3종: 버퍼링하면 이벤트가 모였다가 한꺼번에 터진다
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;             # 오래 열려 있는 스트림 연결 허용
    }
}
